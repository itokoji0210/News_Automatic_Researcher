name: Update trends and publish Pages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: "0 21 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: update-trends-and-pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync latest main
        run: |
          git fetch origin main
          git pull --rebase origin main

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Analyze trends
        run: npm run analyze:trends

      - name: Score topics
        run: npm run score:topics

      - name: Generate Codex prompt
        run: npm run generate:codex-prompt

      - name: Build static Pages files
        run: npm run build:pages

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update trend data
          file_pattern: data/*.json docs/** index.html styles.css app.js
          commit_author: itokoji0210 <171212899+itokoji0210@users.noreply.github.com>

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - uses: actions/deploy-pages@v4
