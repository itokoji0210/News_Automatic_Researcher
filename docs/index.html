<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ニューストレンド写真ネタ</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>ニューストレンド写真ネタ</h1>
        <p id="generatedAt">未更新</p>
      </div>
      <button id="analyzeButton" type="button">今日のトレンドを更新</button>
    </header>

    <main class="layout">
      <section class="panel wide promptPanel">
        <div class="sectionHead">
          <div>
            <h2>Codexに貼る取材精査プロンプト</h2>
            <p id="promptStatus" class="muted">生成待ち</p>
          </div>
          <button id="copyPromptButton" type="button">プロンプトをコピー</button>
        </div>
        <textarea id="codexPrompt" readonly spellcheck="false"></textarea>
      </section>

      <section class="panel wide">
        <div class="sectionHead">
          <h2>今日のニューストレンド</h2>
          <span id="sourceStatus"></span>
        </div>
        <div id="newsTrends" class="newsGrid"></div>
      </section>

      <section class="panel">
        <h2>急上昇ワード</h2>
        <div id="risingWords" class="chips"></div>
      </section>

      <section class="panel">
        <h2>ユーザー評価で上がってきたネタ</h2>
        <div id="learnedTopics" class="stack"></div>
      </section>

      <section class="panel wide">
        <h2>トレンドから作った写真ネタ</h2>
        <div id="topics" class="topicGrid"></div>
      </section>

      <section class="panel">
        <h2>後で見るリスト</h2>
        <div id="watchLater" class="stack"></div>
      </section>

      <section class="panel">
        <h2>取材済み・非表示リスト</h2>
        <div id="hiddenOrCovered" class="stack"></div>
      </section>
    </main>

    <template id="topicTemplate">
      <article class="topicCard">
        <div class="metaLine">
          <span class="word"></span>
          <span class="source"></span>
        </div>
        <h3></h3>
        <ul class="candidateList"></ul>
        <a class="evidence" target="_blank" rel="noreferrer">根拠URL</a>
        <div class="badges"></div>
        <div class="actions">
          <button type="button" data-action="usable">使える</button>
          <button type="button" data-action="weak">いまいち</button>
          <button type="button" data-action="covered">取材済み</button>
          <button type="button" data-action="verify">要確認</button>
          <button type="button" data-action="hidden">非表示</button>
          <button type="button" data-action="later">後で見る</button>
        </div>
      </article>
    </template>

    <script src="app.js" type="module"></script>
  </body>
</html>
